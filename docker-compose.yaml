services:
  opencode-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencode:latest
    container_name: opencode-server-${PROJECT_NAME}
    ports:
      - "${SERVER_PORT}:4096"
    volumes:
      - ${HOME}/.config/opencode:/home/node/.config/opencode:ro
      - ${HOME}/.local/share/opencode:/home/node/.local/share/opencode:rw
      - ${HOME}/.local/state:/home/node/.local/state:rw
      - .:/workspace:rw
    environment:
      - NODE_ENV=production
      - OPENCODE_HOST=0.0.0.0
    entrypoint: ["opencode", "serve", "--hostname", "0.0.0.0", "--port", "4096"]

version: '3.8'

services:
  opencode-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencode:latest
    container_name: opencode-server
    ports:
      - "127.0.0.1:4096:4096"
    volumes:
      # Mount host configuration (read-only)
      - ${HOME}/.config/opencode:/root/.config/opencode:ro
      # Mount local data directory (read-write for cache/sessions)
      - ${HOME}/.local/share/opencode:/root/.local/share/opencode:rw
      # Mount current directory as workspace
      - .:/workspace:rw
    environment:
      - NODE_ENV=production
      - OPENCODE_HOST=127.0.0.1
      - OPENCODE_PORT=4096
    restart: unless-stopped
    entrypoint: ["opencode", "serve", "--hostname", "127.0.0.1", "--port", "4096"]
